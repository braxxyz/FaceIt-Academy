<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión | Academy CR</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <script src="../assets/js/app.js" defer></script>
</head>
<body class="auth-page">
  <main class="auth-shell">
    <div class="auth-noise" aria-hidden="true"></div>
    <div class="auth-orb auth-orb-small" aria-hidden="true"></div>
    <div class="auth-planet" aria-hidden="true"></div>

    <section class="auth-card-wrap">
      <div class="auth-brand">
        <a class="auth-logo" href="index.html">
          <img class="logo-image" src="../assets/images/Costa_Rica_Academy.png" alt="Academy CR logo" />
        </a>
      </div>

      <div class="auth-card">
        <div class="auth-glow" aria-hidden="true"></div>
        <div class="auth-card-top">
          <div class="auth-logo-badge">
            <img class="logo-image" src="../assets/images/Costa_Rica_Academy.png" alt="Academy CR logo" />
          </div>
        </div>

        <div class="auth-tabs" role="tablist" aria-label="Acceso">
          <a href="#" id="show-login" class="auth-tab active" role="tab" aria-selected="true">Iniciar sesión</a>
          <a href="#" id="show-register" class="auth-tab" role="tab" aria-selected="false">Registrarse</a>
        </div>

        <div id="login-section" class="auth-panel">
          <h1>Bienvenido de nuevo</h1>
          <p class="auth-copy">Inicia sesión para seguir con tu perfil, tus equipos y tu progreso.</p>

          <form id="login-form" class="auth-form">
            <div class="form-group auth-field">
              <label for="overwatch-id">Usuario o correo electrónico</label>
              <input id="overwatch-id" name="overwatchId" type="text" placeholder="correo@ejemplo.com" required />
            </div>
            <div class="form-group password-group auth-field">
              <label for="password">Contraseña</label>
              <div class="password-field auth-password-field">
                <input id="password" name="password" type="password" placeholder="Ingresa tu contraseña" required />
                <button type="button" class="password-toggle auth-toggle" aria-label="Mostrar contraseña">Ver</button>
              </div>
            </div>

            <div class="auth-links-row">
              <label class="auth-check">
                <input type="checkbox" name="remember" />
                <span>Recordarme</span>
              </label>
              <a href="index.html" class="auth-link-subtle">Volver al inicio</a>
            </div>

            <button type="submit" class="btn btn-primary auth-submit">Iniciar Sesión</button>
          </form>

          <div class="auth-divider"><span>o</span></div>
          <a class="auth-ghost-btn" href="index.html">Explorar sin iniciar sesión</a>
        </div>

        <div id="register-section" class="auth-panel" style="display: none;">
          <h1>Crea tu cuenta</h1>
          <p class="auth-copy">Regístrate con los mismos colores y estilo del sitio para entrar a la academia.</p>

          <form id="register-form" class="auth-form">
            <div class="form-group auth-field">
              <label for="reg-name">Nombre completo</label>
              <input id="reg-name" name="name" type="text" placeholder="Tu nombre" required />
            </div>
            <div class="form-group auth-field">
              <label for="reg-email">Correo electrónico</label>
              <input id="reg-email" name="email" type="email" placeholder="correo@ejemplo.com" required />
            </div>
            <div class="form-group auth-field">
              <label for="reg-overwatch-id">Usuario y Tag de OW</label>
              <input id="reg-overwatch-id" name="overwatchId" type="text" placeholder="Ej: Akashi#1234" required />
            </div>
            <div class="form-group password-group auth-field">
              <label for="reg-password">Crear Contraseña</label>
              <div class="password-field auth-password-field">
                <input id="reg-password" name="password" type="password" placeholder="Crea una contraseña" required />
                <button type="button" class="password-toggle auth-toggle" aria-label="Mostrar contraseña">Ver</button>
              </div>
            </div>

            <button type="submit" class="btn btn-primary auth-submit">Crear Cuenta</button>
          </form>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
