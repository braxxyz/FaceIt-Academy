<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión | Academy CR</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <script src="../assets/js/app.js" defer></script>
</head>
<body class="auth-page">
  <main class="auth-shell">
    <div class="auth-noise" aria-hidden="true"></div>
    <div class="auth-orb auth-orb-small" aria-hidden="true"></div>
    <div class="auth-planet" aria-hidden="true"></div>

    <section class="auth-card-wrap">
      <div class="auth-brand">
        <a class="auth-logo" href="index.html">
          <img class="logo-image" src="../assets/images/Costa_Rica_Academy.png" alt="Academy CR logo" />
          <span>ACADEMY CR</span>
        </a>
      </div>

      <div class="auth-card">
        <div class="auth-glow" aria-hidden="true"></div>

        <div id="login-section" class="auth-panel">
          <p class="auth-kicker">Acceso competitivo</p>
          <h1>Sign In</h1>
          <p class="auth-copy">Keep it all together and you're be fine.</p>

          <form id="login-form" class="auth-form">
            <div class="form-group auth-field">
              <label for="overwatch-id">Usuario o BattleTag</label>
              <input id="overwatch-id" name="overwatchId" type="text" placeholder="Ej: Akashi#1234" required />
            </div>
            <div class="form-group password-group auth-field">
              <label for="password">Password</label>
              <div class="password-field auth-password-field">
                <input id="password" name="password" type="password" placeholder="Ingresa tu contraseña" required />
                <button type="button" class="password-toggle auth-toggle" aria-label="Mostrar contraseña">Show</button>
              </div>
            </div>

            <div class="auth-links-row">
              <a href="index.html" class="auth-link-subtle">Back to home</a>
            </div>

            <button type="submit" class="btn btn-primary auth-submit">Sign In</button>
          </form>

          <div class="auth-divider"><span>or</span></div>
          <a class="auth-ghost-btn" href="index.html">Explore without login</a>
          <p class="auth-switch">New to Academy? <a href="#" id="show-register">Join Now</a></p>
        </div>

        <div id="register-section" class="auth-panel" style="display: none;">
          <p class="auth-kicker">Nueva cuenta</p>
          <h1>Create Account</h1>
          <p class="auth-copy">Crea tu acceso antes de entrar a la academia.</p>

          <form id="register-form" class="auth-form">
            <div class="form-group auth-field">
              <label for="reg-name">Nombre completo</label>
              <input id="reg-name" name="name" type="text" placeholder="Tu nombre" required />
            </div>
            <div class="form-group auth-field">
              <label for="reg-email">Correo electrónico</label>
              <input id="reg-email" name="email" type="email" placeholder="correo@ejemplo.com" required />
            </div>
            <div class="form-group auth-field">
              <label for="reg-overwatch-id">Usuario y Tag de OW</label>
              <input id="reg-overwatch-id" name="overwatchId" type="text" placeholder="Ej: Akashi#1234" required />
            </div>
            <div class="form-group password-group auth-field">
              <label for="reg-password">Crear Password</label>
              <div class="password-field auth-password-field">
                <input id="reg-password" name="password" type="password" placeholder="Crea una contraseña" required />
                <button type="button" class="password-toggle auth-toggle" aria-label="Mostrar contraseña">Show</button>
              </div>
            </div>

            <button type="submit" class="btn btn-primary auth-submit">Create Account</button>
          </form>

          <p class="auth-switch">Already have an account? <a href="#" id="show-login">Sign In</a></p>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
